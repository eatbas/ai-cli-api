[server]
host = "127.0.0.1"
port = 8000

[shell]
# On Windows the app prefers Git Bash automatically when this is empty.
path = ""

[providers.gemini]
enabled = true
executable = ""
models = ["gemini-3.1-pro-preview", "gemini-3-flash-preview"]
default_options = { extra_args = [] }

[providers.codex]
enabled = true
executable = ""
models = ["codex-5.3", "gpt-5.4", "gpt-5.4-mini"]
default_options = { extra_args = [] }

[providers.claude]
enabled = true
executable = ""
models = ["opus", "sonnet", "haiku"]
default_options = { extra_args = [] }

[providers.kimi]
enabled = true
executable = ""
models = ["kimi-code/kimi-for-coding"]
default_options = { extra_args = [] }

[providers.copilot]
enabled = true
executable = ""
models = [
  "claude-sonnet-4.6",
  "claude-sonnet-4.5",
  "claude-haiku-4.5",
  "claude-opus-4.6",
  "claude-opus-4.5",
  "claude-sonnet-4",
  "gemini-3-pro-preview",
  "gpt-5.4",
  "gpt-5.3-codex",
  "gpt-5.2-codex",
  "gpt-5.2",
  "gpt-5.1-codex-max",
  "gpt-5.1-codex",
  "gpt-5.1",
  "gpt-5.4-mini",
  "gpt-5.1-codex-mini",
  "gpt-5-mini",
  "gpt-4.1",
]
default_options = { extra_args = [] }

[updater]
enabled = true
interval_hours = 4
auto_update = true
